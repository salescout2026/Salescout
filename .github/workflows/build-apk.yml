name: Build SaleScout Current APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SaleScout Current APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Clean workspace and unzip current app
        shell: bash
        run: |
          echo "Files in repo root:"
          ls -la

          echo "Checking for SaleScout_Current.zip..."
          test -f SaleScout_Current.zip

          echo "Removing old extracted app files so this build cannot reuse leftovers..."
          rm -rf app build.gradle settings.gradle gradle gradlew gradlew.bat salescout-debug.keystore

          echo "Testing ZIP..."
          unzip -t SaleScout_Current.zip

          echo "Unzipping current SaleScout app..."
          unzip -o SaleScout_Current.zip

          echo "Checking Android project files..."
          test -f settings.gradle
          test -f app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaleScout-current-apk
          path: app/build/outputs/apk/debug/app-debug.apk
