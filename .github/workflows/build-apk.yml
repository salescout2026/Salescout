name: Build and Publish SaleScout Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ANDROID_ZIP: SaleScout_Current.zip
  IPHONE_ZIP: SaleScout_iPhone_WebApp_Current.zip

concurrency:
  group: salescout-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build Android APK and publish family hub
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Find app ZIP files
        id: zips
        shell: bash
        run: |
          set -e
          echo "Repo root files:"
          ls -la

          if [ ! -f "$ANDROID_ZIP" ]; then
            echo "SaleScout_Current.zip was not found. Looking for another SaleScout Android ZIP..."
            FOUND_ANDROID=$(find . -maxdepth 1 -type f -name 'SaleScout*.zip' ! -name 'SaleScout_iPhone*.zip' | sed 's#^./##' | head -n 1)
            if [ -z "$FOUND_ANDROID" ]; then
              echo "ERROR: No Android app ZIP found in the repo root. Upload SaleScout_Current.zip to the main/root folder."
              exit 1
            fi
            ANDROID_ZIP="$FOUND_ANDROID"
          fi

          if [ ! -f "$IPHONE_ZIP" ]; then
            echo "SaleScout_iPhone_WebApp_Current.zip was not found. Looking for another iPhone web app ZIP..."
            FOUND_IPHONE=$(find . -maxdepth 1 -type f -name 'SaleScout_iPhone*.zip' | sed 's#^./##' | head -n 1)
            if [ -z "$FOUND_IPHONE" ]; then
              echo "ERROR: No iPhone web app ZIP found in the repo root. Upload SaleScout_iPhone_WebApp_Current.zip to the main/root folder."
              exit 1
            fi
            IPHONE_ZIP="$FOUND_IPHONE"
          fi

          echo "Using Android ZIP: $ANDROID_ZIP"
          echo "Using iPhone ZIP: $IPHONE_ZIP"
          unzip -t "$ANDROID_ZIP"
          unzip -t "$IPHONE_ZIP"
          echo "android_zip=$ANDROID_ZIP" >> "$GITHUB_OUTPUT"
          echo "iphone_zip=$IPHONE_ZIP" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unzip Android project
        id: android_project
        shell: bash
        run: |
          set -e
          rm -rf android_project public
          mkdir android_project
          unzip -o "${{ steps.zips.outputs.android_zip }}" -d android_project

          PROJECT_DIR=$(find android_project -name settings.gradle -printf '%h\n' | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Could not find settings.gradle inside the Android ZIP. The ZIP must contain the Android project files."
            find android_project -maxdepth 3 -type f | sort | head -n 80
            exit 1
          fi

          if [ ! -f "$PROJECT_DIR/app/build.gradle" ]; then
            echo "ERROR: Found settings.gradle in $PROJECT_DIR but could not find app/build.gradle."
            find "$PROJECT_DIR" -maxdepth 3 -type f | sort | head -n 80
            exit 1
          fi

          echo "Android project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        shell: bash
        run: |
          set -e
          gradle --no-daemon -p "${{ steps.android_project.outputs.project_dir }}" assembleDebug
          test -f "${{ steps.android_project.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk"

      - name: Prepare public hub website
        shell: bash
        run: |
          set -e
          mkdir -p public/iphone
          unzip -o "${{ steps.zips.outputs.iphone_zip }}" -d public/iphone_raw

          IPHONE_DIR=$(find public/iphone_raw -name index.html -printf '%h\n' | head -n 1)
          if [ -z "$IPHONE_DIR" ]; then
            echo "ERROR: Could not find index.html inside the iPhone web app ZIP."
            find public/iphone_raw -maxdepth 3 -type f | sort | head -n 80
            exit 1
          fi

          cp -R "$IPHONE_DIR"/. public/iphone/
          cp "${{ steps.android_project.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk" public/SaleScout.apk
          cp public/iphone/icons/apple-touch-icon.png public/salescout-icon.png 2>/dev/null || true

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>SaleScout Family App</title>
            <link rel="icon" href="salescout-icon.png" />
            <style>
              :root { color-scheme: light; --green:#0f7a3b; --green2:#0b5f2e; --bg:#f5f7f5; --card:#fff; --text:#102014; --muted:#5f6f64; --line:#dce8df; --warn:#fff4cf; --warnText:#5e4300; }
              * { box-sizing:border-box; }
              body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:linear-gradient(180deg,#eaf5ec,var(--bg)); color:var(--text); }
              .wrap { max-width:820px; margin:0 auto; padding:28px 16px 42px; }
              .hero { text-align:center; padding:18px 8px 8px; }
              .icon { width:92px; height:92px; border-radius:22px; box-shadow:0 10px 24px rgba(0,0,0,.14); background:#0f7a3b; }
              h1 { margin:14px 0 6px; font-size:2rem; line-height:1.1; }
              .sub { margin:0 auto; color:var(--muted); font-size:1.05rem; max-width:610px; }
              .grid { display:grid; grid-template-columns:1fr; gap:14px; margin-top:22px; }
              @media (min-width:740px){ .grid{ grid-template-columns:1fr 1fr; } }
              .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 8px 20px rgba(16,32,20,.08); }
              .card h2 { margin:0 0 8px; font-size:1.25rem; }
              .card h3 { margin:18px 0 7px; font-size:1.05rem; }
              .card p { color:var(--muted); margin:0 0 14px; line-height:1.38; }
              .btn { display:block; text-align:center; text-decoration:none; font-weight:800; background:var(--green); color:white; padding:14px 16px; border-radius:14px; box-shadow:0 7px 14px rgba(15,122,59,.22); }
              .btn:active { background:var(--green2); transform:translateY(1px); }
              .steps { margin:12px 0 0; padding-left:20px; color:#304637; line-height:1.45; }
              .steps li { margin:4px 0; }
              details { margin-top:14px; border:1px solid var(--line); border-radius:14px; padding:12px 13px; background:#f8fbf8; }
              summary { cursor:pointer; font-weight:900; color:#173f25; }
              .note { margin-top:12px; background:var(--warn); color:var(--warnText); border-radius:12px; padding:10px 12px; line-height:1.35; font-weight:650; }
              .tiny { font-size:.92rem; color:var(--muted); margin-top:18px; text-align:center; }
              code { background:#eef4ef; padding:2px 5px; border-radius:6px; }
            </style>
          </head>
          <body>
            <main class="wrap">
              <section class="hero">
                <img class="icon" src="salescout-icon.png" alt="SaleScout icon" />
                <h1>SaleScout Family App</h1>
                <p class="sub">Use one page for Android and iPhone. Android installs the APK. iPhone opens the web app and adds it to the Home Screen.</p>
              </section>

              <section class="grid">
                <article class="card">
                  <h2>Android</h2>
                  <p>Download the app installer, open it, and allow installs from your browser or Files app if Android asks.</p>
                  <a class="btn" href="SaleScout.apk" download>Download Android APK</a>
                  <ol class="steps">
                    <li>Tap <strong>Download Android APK</strong>.</li>
                    <li>Open <code>SaleScout.apk</code> when the download finishes.</li>
                    <li>Tap <strong>Install</strong>.</li>
                  </ol>

                  <details open>
                    <summary>Android says “not allowed” or “install blocked”?</summary>
                    <ol class="steps">
                      <li>Tap <strong>Settings</strong> on the warning screen if Android shows one.</li>
                      <li>Turn on <strong>Allow from this source</strong> for the app you used to download/open it, usually <strong>Chrome</strong>, <strong>Drive</strong>, or <strong>My Files</strong>.</li>
                      <li>Tap the back arrow.</li>
                      <li>Tap <strong>Install</strong> again.</li>
                    </ol>
                    <p class="note">On Samsung phones, the manual path is usually:<br><strong>Settings → Security and privacy → More security settings → Install unknown apps</strong><br>Then choose Chrome, Drive, or My Files and turn on <strong>Allow from this source</strong>.</p>
                    <p>After SaleScout installs, you can turn that permission back off for safety.</p>
                  </details>

                  <details>
                    <summary>Can’t find the downloaded APK?</summary>
                    <ol class="steps">
                      <li>Open <strong>My Files</strong>.</li>
                      <li>Go to <strong>Downloads</strong>.</li>
                      <li>Tap <code>SaleScout.apk</code>.</li>
                    </ol>
                  </details>
                </article>

                <article class="card">
                  <h2>iPhone</h2>
                  <p>Open the iPhone web app in Safari, then add it to the Home Screen so it looks like an app.</p>
                  <a class="btn" href="iphone/">Open iPhone Web App</a>
                  <ol class="steps">
                    <li>Open the button in <strong>Safari</strong>.</li>
                    <li>Tap the <strong>Share</strong> button.</li>
                    <li>Tap <strong>Add to Home Screen</strong>.</li>
                    <li>Tap <strong>Add</strong>.</li>
                  </ol>

                  <details open>
                    <summary>iPhone tip</summary>
                    <p>If the page opens inside Facebook, Messenger, Gmail, or another app, tap the browser menu and choose <strong>Open in Safari</strong>. The <strong>Add to Home Screen</strong> option is in Safari’s Share menu.</p>
                  </details>
                </article>
              </section>

              <p class="tiny">SaleScout is for personal/family use. Replace <code>SaleScout_Current.zip</code> and rebuild when you want to publish an update.</p>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Android APK artifact too
        uses: actions/upload-artifact@v4
        with:
          name: SaleScout-current-apk
          path: public/SaleScout.apk

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
