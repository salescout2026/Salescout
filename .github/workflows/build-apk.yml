name: Build SaleScout APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SaleScout debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Create Android project
        shell: bash
        run: |
          mkdir -p app/src/main/java/com/salescout/app
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'SaleScoutAndroidWrapper'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.salescout.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.salescout.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 3
                  versionName '0.1.2'
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">SaleScout</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="salescout_green">#2ecc71</color>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:colorAccent">@color/salescout_green</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <queries>
                  <package android:name="com.google.android.apps.maps" />
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="geo" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="google.navigation" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
              </queries>

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="keyboardHidden|orientation|screenSize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/salescout/app/MainActivity.java <<'EOF'
          package com.salescout.app;

          import android.Manifest;
          import android.app.Activity;
          import android.content.ActivityNotFoundException;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Message;
          import android.view.ViewGroup;
          import android.webkit.GeolocationPermissions;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;

          import java.net.URISyntaxException;

          public class MainActivity extends Activity {
              private static final String APP_URL = "https://salescout-8a539.web.app";
              private static final String APP_HOST = "salescout-8a539.web.app";
              private static final String GOOGLE_MAPS_PACKAGE = "com.google.android.apps.maps";
              private static final int LOCATION_REQUEST_CODE = 42;

              private WebView webView;
              private String pendingGeoOrigin;
              private GeolocationPermissions.Callback pendingGeoCallback;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setLayoutParams(new ViewGroup.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.MATCH_PARENT
                  ));
                  setContentView(webView);
                  configureWebView(webView);

                  if (savedInstanceState == null) {
                      webView.loadUrl(APP_URL);
                  } else {
                      webView.restoreState(savedInstanceState);
                  }
              }

              private void configureWebView(WebView targetWebView) {
                  WebSettings settings = targetWebView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setGeolocationEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);
                  settings.setSupportMultipleWindows(true);
                  settings.setJavaScriptCanOpenWindowsAutomatically(true);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);
                  }

                  targetWebView.addJavascriptInterface(new MapsBridge(), "SaleScoutAndroid");
                  targetWebView.setWebViewClient(new SaleScoutWebViewClient());
                  targetWebView.setWebChromeClient(new SaleScoutChromeClient());
              }

              private class SaleScoutWebViewClient extends WebViewClient {
                  @Override
                  public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                      return handleUrl(request.getUrl().toString());
                  }

                  @SuppressWarnings("deprecation")
                  @Override
                  public boolean shouldOverrideUrlLoading(WebView view, String url) {
                      return handleUrl(url);
                  }
              }

              private class SaleScoutChromeClient extends WebChromeClient {
                  @Override
                  public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M &&
                              checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) != PackageManager.PERMISSION_GRANTED) {
                          pendingGeoOrigin = origin;
                          pendingGeoCallback = callback;
                          requestPermissions(new String[]{Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION}, LOCATION_REQUEST_CODE);
                      } else {
                          callback.invoke(origin, true, false);
                      }
                  }

                  @Override
                  public boolean onCreateWindow(WebView view, boolean isDialog, boolean isUserGesture, Message resultMsg) {
                      WebView popupWebView = new WebView(MainActivity.this);
                      popupWebView.setWebViewClient(new WebViewClient() {
                          @Override
                          public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                              return handleUrl(request.getUrl().toString());
                          }

                          @SuppressWarnings("deprecation")
                          @Override
                          public boolean shouldOverrideUrlLoading(WebView view, String url) {
                              return handleUrl(url);
                          }
                      });

                      WebView.WebViewTransport transport = (WebView.WebViewTransport) resultMsg.obj;
                      transport.setWebView(popupWebView);
                      resultMsg.sendToTarget();
                      return true;
                  }
              }

              private class MapsBridge {
                  @JavascriptInterface
                  public void openGoogleMaps(String url) {
                      runOnUiThread(() -> openMapsUrl(url));
                  }
              }

              private boolean handleUrl(String url) {
                  if (url == null || url.trim().isEmpty()) {
                      return false;
                  }

                  if (isSaleScoutUrl(url)) {
                      return false;
                  }

                  if (url.startsWith("intent://")) {
                      openIntentUrl(url);
                      return true;
                  }

                  if (isGoogleMapsUrl(url)) {
                      openMapsUrl(url);
                      return true;
                  }

                  if (isExternalScheme(url)) {
                      openGenericExternalUrl(url);
                      return true;
                  }

                  return false;
              }

              private boolean isSaleScoutUrl(String url) {
                  try {
                      Uri uri = Uri.parse(url);
                      String host = uri.getHost();
                      return host != null && host.equalsIgnoreCase(APP_HOST);
                  } catch (Exception e) {
                      return false;
                  }
              }

              private boolean isGoogleMapsUrl(String url) {
                  try {
                      Uri uri = Uri.parse(url);
                      String scheme = uri.getScheme();
                      String host = uri.getHost();

                      if (scheme == null) {
                          return false;
                      }

                      if (scheme.equalsIgnoreCase("geo") || scheme.equalsIgnoreCase("google.navigation")) {
                          return true;
                      }

                      if (host == null) {
                          return false;
                      }

                      String normalizedHost = host.toLowerCase();
                      String path = uri.getPath() == null ? "" : uri.getPath().toLowerCase();

                      return normalizedHost.equals("maps.app.goo.gl")
                              || normalizedHost.equals("goo.gl")
                              || normalizedHost.equals("maps.google.com")
                              || (normalizedHost.equals("www.google.com") && path.startsWith("/maps"))
                              || (normalizedHost.equals("google.com") && path.startsWith("/maps"));
                  } catch (Exception e) {
                      return false;
                  }
              }

              private boolean isExternalScheme(String url) {
                  try {
                      Uri uri = Uri.parse(url);
                      String scheme = uri.getScheme();
                      if (scheme == null) {
                          return false;
                      }

                      return scheme.equalsIgnoreCase("mailto")
                              || scheme.equalsIgnoreCase("tel")
                              || scheme.equalsIgnoreCase("sms")
                              || scheme.equalsIgnoreCase("market");
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void openMapsUrl(String url) {
                  try {
                      Uri uri = Uri.parse(url);
                      Intent mapsIntent = new Intent(Intent.ACTION_VIEW, uri);
                      mapsIntent.setPackage(GOOGLE_MAPS_PACKAGE);
                      startActivity(mapsIntent);
                  } catch (ActivityNotFoundException mapsNotInstalled) {
                      openGenericExternalUrl(url);
                  } catch (Exception e) {
                      showOpenError();
                  }
              }

              private void openIntentUrl(String url) {
                  try {
                      Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                      startActivity(intent);
                  } catch (ActivityNotFoundException appMissing) {
                      openIntentFallbackUrl(url);
                  } catch (URISyntaxException e) {
                      showOpenError();
                  } catch (Exception e) {
                      showOpenError();
                  }
              }

              private void openIntentFallbackUrl(String url) {
                  try {
                      Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                      String fallbackUrl = intent.getStringExtra("browser_fallback_url");
                      if (fallbackUrl != null && !fallbackUrl.trim().isEmpty()) {
                          openGenericExternalUrl(fallbackUrl);
                      } else {
                          showOpenError();
                      }
                  } catch (Exception e) {
                      showOpenError();
                  }
              }

              private void openGenericExternalUrl(String url) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      startActivity(intent);
                  } catch (Exception e) {
                      showOpenError();
                  }
              }

              private void showOpenError() {
                  Toast.makeText(this, "No app found to open this link.", Toast.LENGTH_SHORT).show();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == LOCATION_REQUEST_CODE && pendingGeoCallback != null) {
                      boolean granted = grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED;
                      pendingGeoCallback.invoke(pendingGeoOrigin, granted, false);
                      pendingGeoOrigin = null;
                      pendingGeoCallback = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  webView.saveState(outState);
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.destroy();
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android tools
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaleScout-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
