name: Build SaleScout APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build SaleScout APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Unzip SaleScout project
        shell: bash
        run: |
          rm -rf app build.gradle settings.gradle salescout-debug.keystore
          unzip -o SaleScout_Project_V8_Compact_Photo_Icon.zip
          ls -la
          test -f settings.gradle
          test -f app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaleScout-v8-compact-photo-icon-apk
          path: app/build/outputs/apk/debug/app-debug.apk
