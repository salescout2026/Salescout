name: Publish SaleScout iPhone Web App

on:
  workflow_dispatch:
  push:
    paths:
      - 'SaleScout_iPhone_WebApp_Current.zip'
      - '.github/workflows/publish-iphone-webapp.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip iPhone web app
        run: |
          test -f SaleScout_iPhone_WebApp_Current.zip
          rm -rf public
          mkdir public
          unzip -o SaleScout_iPhone_WebApp_Current.zip -d public
          test -f public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
